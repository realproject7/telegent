name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-gates:
    name: Release gates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.33.3 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium headless shell
        run: pnpm exec playwright install --only-shell chromium

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: No stubs
        run: pnpm no-stub

      - name: Whitespace check
        run: git diff --check
